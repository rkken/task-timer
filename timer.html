<!DOCTYPE html>

<html lang="eng">
<head>
    <link rel="stylesheet" href="timer_style.css">
    <script src="timer.js"></script>
    <title>
        Task Timer
    </title>
</head>
<body>
    <div id="input_div">
        <input
        type="text"
        size="50"
        height="20"
        id="task"
        placeholder="Input Task"
        autofocus="true"
        />
        <input
        type="submit"
        id="task_submit"
        placeholder="Enter"
        />
    </div>
    <h1 id="task_output" class="text_output"></h1>
    <h1 id="timer_text" class="text_output">00:00:00</h1>
    <div id="buttons_div">
        <button id="start"> Start</button>
        <button id="pause"> Pause</button>
        <button id="stop"> Stop</button>
    </div>
</body>
</html>
